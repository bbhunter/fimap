# fimap php.yaml — ported from src/config/php.xml revision 4
# PHP language definition. No exec() in quiz — uses pure Python generator.

language: php
revision: 4
force_inclusion_test: false
autor: "Iman Karim (imax@tha-imax.de)"

snipe:
  regex: 'Failed opening( required)* ''(?P<incname>[\d\w/\.\-:\\]*?%s[\d\w/\.\-\\]*?)'' (for inclusion)*'

relative_files: []

absolute_files:
  - path: "php://input"
    post: "__QUIZ__"
    find: "__ANSWER__"
    flags: rxP
    unix: true
    windows: true

remote_files:
  - path: "http://www.tha-imax.de/fimap_testfiles/test"
    find: "This is the right thing."
    flags: rR
    unix: true
    windows: true

log_files: []

