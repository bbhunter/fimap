# fimap generic.yaml — ported from src/config/generic.xml revision 3
# Basic scan parameters: relative/absolute/log/blind files, shell commands.

relative_files:
  - path: /etc/passwd
    find: "root:"
    flags: r
    unix: true
    windows: false
  - path: "c:\\boot.ini"
    find: "[operating"
    flags: r
    unix: false
    windows: true
  - path: /proc/self/environ
    find: "HTTP_USER_AGENT="
    flags: rxA
    unix: true
    windows: false
  - path: "c:\\windows\\win.ini"
    find: "[fonts"
    flags: r
    unix: false
    windows: true

absolute_files: []

