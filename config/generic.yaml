blind_files:
  mindepth: 0
  maxdepth: 15
  files:
    - path: /etc/passwd
      find: "root:"
      flags: r
      unix: true
      windows: false
    - path: "c:\\boot.ini"
      find: "[operating"
      flags: r
      unix: false
      windows: true
    - path: "c:\\windows\\win.ini"
      find: "[fonts"
      flags: r
      unix: false
      windows: true
    - path: "http://www.tha-imax.de/fimap_testfiles/test"
      find: "This is the right thing."
      flags: rR
      unix: true
      windows: true
    - path: "http://www.tha-imax.de/fimap_testfiles/test.php"
      find: "This is the right thing."
      flags: rR
      unix: true
      windows: true
    - path: "http://www.tha-imax.de/fimap_testfiles/test.html"
      find: "This is the right thing."
      flags: rR
      unix: true
      windows: true
    - path: "http://www.tha-imax.de/fimap_testfiles/test.inc"
      find: "This is the right thing."
      flags: rR
      unix: true
      windows: true

methods:
  unix:
    concatcommand: ";"
    shellquiz:
      type: shell_math          # pure Python — no exec()
    kernelversion:
      source: "uname -r -s"
    currentdir:
      source: "pwd"
    currentuser:
      source: "whoami"
    cd:
      source: "cd '__DIR__'"
  windows:
    concatcommand: "&"
    shellquiz:
      type: shell_math          # pure Python — no exec()
    kernelversion:
      source: "ver"
    currentdir:
      source: "chdir"
    currentuser:
      source: "echo %USERNAME%"
    cd:
      source: 'cd "__DIR__"'

languagesets:
  - name: PHP
    langfile: php.yaml
  # Perl dropped — non-functional in original, quiz generated PHP code
